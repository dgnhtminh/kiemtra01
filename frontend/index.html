<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }
        .hero h1 {
            font-size: 4rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
        }
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 800px;
            width: 100%;
        }
        .portal-card {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }
        .portal-card h2 {
            border: none;
            margin-bottom: 0.5rem;
        }
        .icon-large {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container hero">
        <h1>Microservices Hub</h1>
        <p>A modern ecosystem for managing technological products, connecting staff with customers seamlessly.</p>
        
        <div class="portal-grid">
            <a href="customer.html" class="glass-panel portal-card">
                <div class="icon-large">🛍️</div>
                <h2>Customer Portal</h2>
                <p style="color: var(--text-muted); text-align: center; margin: 0;">Shop laptops and mobiles, manage your cart.</p>
            </a>
            
            <a href="staff.html" class="glass-panel portal-card">
                <div class="icon-large">👨‍💻</div>
                <h2>Staff Portal</h2>
                <p style="color: var(--text-muted); text-align: center; margin: 0;">Manage inventory, update items.</p>
            </a>
        </div>
    </div>
</body>
</html>
